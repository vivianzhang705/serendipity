        const playlist = document.getElementById('playlist');
        const audioPlayer = document.getElementById('audioPlayer');
        const currentSongEl = document.getElementById('currentSong');
        let currentIndex = -1;
        let isLoading = false;

        // 生成歌单列表
        songs.forEach(function(song, index) {
            const songItem = document.createElement('div');
            songItem.className = 'song-item';
            songItem.innerHTML = `
                <div class="song-number">${index + 1}</div>
                <div class="song-info">
                    <div class="song-title">${song.title}</div>
                </div>
                <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            `;

            songItem.addEventListener('click', function() {
                if (isLoading) {
                    console.log('正在加载中，请稍候...');
                    return;
                }
                playSong(index);
            }, false);

            playlist.appendChild(songItem);
        });

        // 播放歌曲函数
        function playSong(index) {
            if (index < 0 || index >= songs.length) {
                console.error('无效的歌曲索引:', index);
                return;
            }

            console.log('开始播放:', songs[index].title);
            isLoading = true;

            const allItems = document.querySelectorAll('.song-item');
            allItems.forEach(function(item) {
                item.classList.remove('playing');
            });

            currentIndex = index;
            allItems[index].classList.add('playing');

            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            audioPlayer.src = songs[index].src;
            currentSongEl.textContent = songs[index].title;

            const playPromise = audioPlayer.play();

            if (playPromise !== undefined) {
                playPromise.then(function() {
                    console.log('播放成功:', songs[index].title);
                    isLoading = false;
                }).catch(function(error) {
                    console.error('播放失败:', error);
                    isLoading = false;
                    alert('播放失败: ' + error.message);
                });
            } else {
                isLoading = false;
            }

            setTimeout(function() {
                try {
                    allItems[index].scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                } catch (e) {
                    console.log('滚动失败:', e);
                }
            }, 200);
        }

        audioPlayer.addEventListener('loadstart', function() {
            console.log('开始加载音频');
        });

        audioPlayer.addEventListener('canplay', function() {
            console.log('音频可以播放');
            isLoading = false;
        });

        audioPlayer.addEventListener('error', function(e) {
            console.error('音频错误:', e);
            isLoading = false;
            alert('音频加载失败，请检查网络或文件路径');
        });

        audioPlayer.addEventListener('ended', function() {
            console.log('歌曲播放结束');
            isLoading = false;
            if (currentIndex < songs.length - 1) {
                setTimeout(function() {
                    playSong(currentIndex + 1);
                }, 500);
            } else {
                console.log('播放列表结束');
            }
        });
    </script>
</body>
</html>
