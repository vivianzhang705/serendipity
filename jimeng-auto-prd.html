<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频切片工作台 · Flamingo</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1677ff;--primary-h:#0958d9;--primary-bg:#e6f4ff;--primary-b:#91caff;
  --bg:#f0f2f5;--surface:#fff;--surface2:#fafafa;
  --border:#e4e4e4;--border2:#f0f0f0;
  --text:#1d1d1d;--text2:#555;--text3:#999;--text4:#bfbfbf;
  --green:#389e0d;--green-bg:#f6ffed;--green-b:#b7eb8f;
  --red:#cf1322;--red-bg:#fff2f0;--red-b:#ffa39e;
  --amber:#d46b08;--amber-bg:#fff7e6;--amber-b:#ffd591;
  --purple:#531dab;--purple-bg:#f9f0ff;--purple-b:#d3adf7;
  --r:6px;--r-sm:4px;
  --shadow-xs:0 1px 3px rgba(0,0,0,.06);
  --shadow-sm:0 2px 8px rgba(0,0,0,.09);
  --shadow:0 4px 16px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.57;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* TOPNAV */
.topnav{height:48px;background:#001529;display:flex;align-items:center;padding:0 0 0 20px;flex-shrink:0;}
.nav-logo{font-size:14px;font-weight:600;color:#fff;margin-right:24px;display:flex;align-items:center;gap:8px;}
.nav-logo-dot{width:6px;height:6px;background:var(--primary);border-radius:50%;}
.nav-tabs{display:flex;height:100%;}
.nav-tab{display:flex;align-items:center;padding:0 18px;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.07);}
.nav-tab.active{color:#fff;border-bottom-color:var(--primary);}
.nav-right{margin-left:auto;padding-right:20px;}
.nav-avatar{width:28px;height:28px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;}
.page-container{flex:1;overflow:hidden;position:relative;}
.tab-page{position:absolute;inset:0;display:flex;flex-direction:column;}

/* SHARED */
.ant-input{height:32px;border:1px solid var(--border);border-radius:var(--r-sm);padding:0 11px;font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--text);background:#fff;outline:none;transition:all .2s;}
.ant-input:hover{border-color:var(--primary);}
.ant-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.15);}
.ant-input::placeholder{color:var(--text4);}
.ant-btn{height:32px;padding:0 15px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;background:#fff;color:var(--text2);transition:all .2s;white-space:nowrap;}
.ant-btn:hover{border-color:var(--primary);color:var(--primary);}
.ant-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff;}
.ant-btn.primary:hover{background:var(--primary-h);}
.ant-btn.sm{height:26px;padding:0 10px;font-size:12px;}
.ant-select{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;color:var(--text2);background:#fff;outline:none;cursor:pointer;font-family:'Noto Sans SC',sans-serif;}
.tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:2px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid;}
.tag-blue{background:var(--primary-bg);color:var(--primary);border-color:var(--primary-b);}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;white-space:nowrap;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.gen-pending .sdot{background:#d9d9d9;}.gen-pending{color:#8c8c8c;}
.gen-ing .sdot{background:var(--amber);animation:blink 1.1s infinite;}.gen-ing{color:var(--amber);}
.gen-done .sdot{background:var(--green);}.gen-done{color:var(--green);}
.ap-pending .sdot{background:var(--primary);}.ap-pending{color:var(--primary);}
.ap-pass .sdot{background:var(--green);}.ap-pass{color:var(--green);}
.ap-fail .sdot{background:var(--red);}.ap-fail{color:var(--red);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:#262626;color:#fff;padding:8px 16px;border-radius:var(--r-sm);font-size:12px;font-weight:500;box-shadow:var(--shadow);z-index:900;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* WORK PAGE */
.work-page{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.work-topbar{background:var(--surface);border-bottom:1px solid var(--border2);flex-shrink:0;display:flex;flex-direction:column;}
.spu-bar{padding:10px 20px;display:flex;align-items:center;gap:8px;}
.spu-bar-right{margin-left:auto;}
.btn-inst-list{height:32px;padding:0 14px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;background:#fff;color:var(--text2);transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.btn-inst-list:hover{border-color:var(--primary);color:var(--primary);}
.btn-inst-list-icon{font-size:14px;line-height:1;}
.work-tabs-row{display:flex;border-top:1px solid var(--border2);}
.work-tab{padding:0 20px;height:36px;display:flex;align-items:center;font-size:13px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .18s;user-select:none;}
.work-tab:hover{color:var(--primary);}
.work-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:500;}
.work-split{flex:1;display:flex;overflow:hidden;}

/* LEFT */
.img-panel{width:240px;flex-shrink:0;border-right:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
.img-panel-hd{padding:0 14px;height:40px;display:flex;align-items:center;border-bottom:1px solid var(--border2);flex-shrink:0;}
.img-panel-title{font-size:12px;font-weight:600;color:var(--text2);}
.img-color-bar{flex-shrink:0;padding:8px 10px 6px;border-bottom:1px solid var(--border2);}
.ctabs{display:flex;gap:4px;flex-wrap:wrap;}
.ctab{display:flex;align-items:center;gap:4px;height:24px;padding:0 9px;border:1px solid var(--border);border-radius:3px;cursor:pointer;font-size:11px;color:var(--text2);background:#fff;transition:all .15s;user-select:none;}
.ctab:hover{border-color:var(--primary);color:var(--primary);}
.ctab.active{border-color:var(--primary);color:var(--primary);background:var(--primary-bg);}
.cdot{width:7px;height:7px;border-radius:50%;border:1px solid rgba(0,0,0,.1);flex-shrink:0;}
.ctab-n{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.ctab.active .ctab-n{color:var(--primary);opacity:.7;}
.img-scroll{flex:1;overflow-y:auto;padding:10px;}
.pair-hint{padding:6px 8px;background:var(--amber-bg);border:1px solid var(--amber-b);border-radius:var(--r-sm);font-size:11px;color:var(--amber);margin-bottom:8px;display:none;}
.pair-hint.show{display:block;}
.img-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.img-card{border:2px solid var(--border);border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:all .15s;position:relative;aspect-ratio:3/4;display:flex;flex-direction:column;background:#fff;user-select:none;}
.img-card:hover{border-color:var(--primary-b);}
.img-card.sel1{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.18);}
.img-card.sel2{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,107,8,.18);}
.img-card-num{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.42);color:#fff;font-size:9px;padding:1px 4px;border-radius:2px;font-family:'DM Mono',monospace;}
.img-card-badge{position:absolute;top:4px;left:4px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;color:#fff;}
.badge-1{background:var(--primary);}
.badge-2{background:var(--amber);}
.img-visual{flex:1;display:flex;align-items:center;justify-content:center;}
.img-visual svg{width:65%;height:65%;}

/* RIGHT */
.rec-panel{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.rec-panel-hd{height:40px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border2);flex-shrink:0;}
.rec-panel-title{font-size:12px;font-weight:600;color:var(--text2);}
.rec-panel-body{flex:1;overflow-y:auto;padding:12px 16px;}
.rec-groups{display:flex;flex-direction:column;gap:8px;}
.rec-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text4);padding:60px 40px;}
.rec-empty-ico{font-size:32px;opacity:.2;}
.gen-bar{background:var(--surface);border-top:1px solid var(--border2);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.btn-generate{height:34px;padding:0 20px;background:var(--primary);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;color:#fff;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .2s;}
.btn-generate:hover:not(:disabled){background:var(--primary-h);}
.btn-generate:disabled{background:#d9d9d9;color:#bfbfbf;cursor:not-allowed;}
.gen-preview{font-size:12px;color:var(--text3);}
.gen-preview strong{color:var(--primary);}

/* GROUP BLOCK */
.inst-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.inst-group-hd{padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:8px;}
.inst-group-name{font-size:12px;font-weight:600;}
.inst-group-prog{font-size:11px;font-family:'DM Mono',monospace;padding:1px 7px;border-radius:10px;}
.prog-none{background:#f5f5f5;color:var(--text4);border:1px solid var(--border2);}
.prog-part{background:var(--primary-bg);color:var(--primary);border:1px solid var(--primary-b);}
.prog-full{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b);}

.inst-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border2);transition:background .12s;}
.inst-row:last-child{border-bottom:none;}
.inst-row:hover{background:#fafafa;}
.inst-row.row-fail{background:#fff8f8;}
.inst-row.row-pass{background:#f9fff6;}

.row-cb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border2);background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;}
.row-cb.checked{background:var(--primary);border-color:var(--primary);}
.row-cb svg{display:none;width:9px;height:9px;}
.row-cb.checked svg{display:block;}
.row-cb-spacer{width:15px;flex-shrink:0;}
.row-thumb{width:32px;height:44px;border-radius:3px;overflow:hidden;border:1px solid var(--border);background:#f5f5f5;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.row-thumb.empty{opacity:.15;}
.row-thumb svg{width:88%;height:88%;}
.row-thumb.clickable{cursor:pointer;}
.row-thumb.clickable:hover{box-shadow:var(--shadow-sm);}
.row-name{width:88px;flex-shrink:0;font-size:12px;font-weight:500;color:var(--text);line-height:1.4;}
.row-content{font-size:11px;color:var(--text2);line-height:1.5;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.row-col{flex-shrink:0;display:flex;align-items:center;}
.col-gen{width:80px;}
.col-ap{width:96px;}
.col-ops{width:120px;gap:5px;}
.col-try{width:88px;}
.btn-try-inline{height:24px;padding:0 9px;border:1px dashed var(--primary-b);border-radius:var(--r-sm);font-size:11px;color:var(--primary);background:var(--primary-bg);cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;transition:all .12s;white-space:nowrap;}
.btn-try-inline:hover{background:var(--primary);color:#fff;border-style:solid;}
.btn-pass{height:24px;padding:0 8px;border-radius:var(--r-sm);font-size:11px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;border:1px solid;background:var(--green-bg);color:var(--green);border-color:var(--green-b);transition:all .12px;white-space:nowrap;}
.btn-pass:hover{background:#d9f7be;}
.btn-fail-act{height:24px;padding:0 8px;border-radius:var(--r-sm);font-size:11px;cursor:pointer;font-family:'Noto Sans SC',sans-serif;font-weight:500;border:1px solid;background:var(--red-bg);color:var(--red);border-color:var(--red-b);transition:all .12s;white-space:nowrap;}
.btn-fail-act:hover{background:#ffe7e7;}

/* MODAL shared */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:750;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-bg.show{opacity:1;pointer-events:all;}
.modal-box{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;max-height:82vh;}
.modal-hd{padding:14px 16px 12px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:14px;font-weight:600;color:var(--text);}
.modal-subtitle{font-size:11px;color:var(--text3);margin-top:2px;}
.modal-body{flex:1;overflow-y:auto;}
.modal-ft{padding:12px 16px;border-top:1px solid var(--border2);flex-shrink:0;display:flex;gap:8px;align-items:center;}
.modal-ft .fail-input{flex:1;height:30px;border:1px solid var(--primary-b);border-radius:var(--r-sm);padding:0 9px;font-size:12px;font-family:'Noto Sans SC',sans-serif;color:var(--text);background:#fff;outline:none;}
.modal-ft .fail-input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.12);}
.btn-fail-submit{height:30px;padding:0 12px;border:none;border-radius:var(--r-sm);font-size:12px;font-family:'Noto Sans SC',sans-serif;cursor:pointer;background:var(--primary);color:#fff;font-weight:500;white-space:nowrap;transition:background .15s;}
.btn-fail-submit:hover{background:var(--primary-h);}
.close-btn{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.06);border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.close-btn:hover{background:rgba(0,0,0,.12);}

/* TRY MODAL */
.try-modal-box{width:540px;max-width:92vw;}
.modal-hist-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#fafafa;border-radius:var(--r-sm);border:1px solid var(--border2);}
.modal-hist-content{flex:1;font-size:12px;color:var(--text);line-height:1.5;}
.modal-empty{color:var(--text4);font-size:12px;text-align:center;padding:20px 0;}
.try-modal-body{padding:10px 16px;display:flex;flex-direction:column;gap:6px;min-height:60px;}

/* INST LIST MODAL */
.inst-modal-box{width:680px;max-width:94vw;}
.inst-modal-body{padding:0;}
table.inst-modal-tbl{width:100%;border-collapse:collapse;}
table.inst-modal-tbl th{background:#fafafa;padding:9px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border2);white-space:nowrap;position:sticky;top:0;z-index:1;}
table.inst-modal-tbl td{padding:9px 14px;border-bottom:1px solid var(--border2);font-size:12px;color:var(--text2);}
table.inst-modal-tbl tbody tr:last-child td{border-bottom:none;}
table.inst-modal-tbl tbody tr:hover td{background:#fafafa;}
.grp-tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:2px;font-size:11px;font-weight:500;white-space:nowrap;border:1px solid;}

/* PLAYER */
.player-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:800;opacity:0;pointer-events:none;transition:opacity .25s;}
.player-bg.show{opacity:1;pointer-events:all;}
.player-inner{width:min(480px,90vw);display:flex;flex-direction:column;}
.player-topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;}
.player-name{font-size:12px;color:rgba(255,255,255,.7);font-family:'DM Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px;}
.player-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.player-close:hover{background:rgba(255,255,255,.22);}
.player-screen{width:100%;aspect-ratio:9/16;max-height:65vh;background:#111;border-radius:var(--r);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
.player-bg-anim{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(22,119,255,.15) 0%,transparent 70%);animation:bgPulse 3s ease-in-out infinite;}
@keyframes bgPulse{0%,100%{opacity:.6;}50%{opacity:1;}}
.player-garment{width:60%;height:60%;display:flex;align-items:center;justify-content:center;animation:garmentFloat 4s ease-in-out infinite;}
@keyframes garmentFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.player-garment svg{width:100%;height:100%;}
.player-demo-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.4);font-size:10px;padding:2px 9px;border-radius:10px;font-family:'DM Mono',monospace;}
.player-controls{display:flex;align-items:center;gap:8px;padding:8px 14px 12px;}
.player-play-btn{width:32px;height:32px;border-radius:50%;background:var(--primary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.player-play-icon{width:0;height:0;border-style:solid;border-width:6px 0 6px 11px;border-color:transparent transparent transparent #fff;margin-left:2px;}
.player-pause-icon{display:flex;gap:2px;}
.player-pause-icon span{width:3px;height:12px;background:#fff;border-radius:2px;display:block;}
.player-progress{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;overflow:hidden;}
.player-progress-fill{height:100%;background:var(--primary);border-radius:2px;width:0%;transition:width .5s linear;}
.player-time{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Mono',monospace;white-space:nowrap;}
</style>
</head>
<body>
<div class="app">
<nav class="topnav">
  <div class="nav-logo"><div class="nav-logo-dot"></div>Flamingo 运营后台</div>
  <div class="nav-tabs">
    <div class="nav-tab active">视频切片</div>
  </div>
  <div class="nav-right"><div class="nav-avatar">运</div></div>
</nav>

<div class="page-container">
<div class="tab-page">
  <div class="work-page">
    <div class="work-topbar">
      <div class="spu-bar">
        <input class="ant-input" id="spuInput" style="width:160px" placeholder="输入 SPU 编号…" onkeydown="if(event.key==='Enter')querySPU()"/>
        <button class="ant-btn primary" onclick="querySPU()">查询</button>
        <div id="spuTag" style="display:none;margin-left:4px">
          <span class="tag tag-blue">
            <span style="font-family:'DM Mono',monospace;font-weight:500" id="rCode"></span>
            &nbsp;<span id="rName"></span>
          </span>
        </div>
        <button class="ant-btn sm" id="btnReset" style="display:none" onclick="resetSPU()">重查</button>
        <span style="font-size:11px;color:var(--text4);margin-left:8px" id="spuHint">试试 SP1001 · SP1002 · SP1003</span>
        <div class="spu-bar-right">
          <button class="btn-inst-list" onclick="openInstModal()">
            <span class="btn-inst-list-icon">☰</span>指令列表
          </button>
        </div>
      </div>
      <div class="work-tabs-row">
        <div class="work-tab active" id="wtSingle" onclick="switchWorkTab('single')">单图组</div>
        <div class="work-tab" id="wtPair" onclick="switchWorkTab('pair')">双图组</div>
      </div>
    </div>

    <div class="work-split">
      <!-- LEFT -->
      <div class="img-panel">
        <div class="img-panel-hd"><span class="img-panel-title" id="imgPanelTitle">选择商品图</span></div>
        <div class="img-color-bar"><div class="ctabs" id="ctabs"></div></div>
        <div class="img-scroll">
          <div class="pair-hint" id="pairHint">点击选图1，再点选图2</div>
          <div class="img-grid" id="imgGrid">
            <div style="color:var(--text4);font-size:12px;padding:20px 0;text-align:center;grid-column:1/-1">先查询 SPU</div>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="rec-panel">
        <div class="rec-panel-hd">
          <span class="rec-panel-title" id="recTitle">切片记录</span>
          <div style="display:flex;align-items:center;gap:8px">
            <select class="ant-select" id="recFilter" onchange="renderRecords()" style="width:108px;height:26px;font-size:11px">
              <option value="">全部状态</option>
              <option value="pending">待生成</option>
              <option value="done_pending">待审核</option>
              <option value="pass">已通过</option>
              <option value="fail">不通过</option>
            </select>
            <span id="recCount" style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace"></span>
          </div>
        </div>

          <div class="gen-preview" id="genPreview"></div>
          <label style="margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer">
            <input type="checkbox" id="chkAll" onchange="toggleAll(this.checked)" style="cursor:pointer"/> 全选
          </label>
        </div>
      </div>

  </div>
</div>

<script>
const COLORS={
  black:{name:'黑色',hex:'#2e2e2e',bg:'#f0f0f0'},white:{name:'白色',hex:'#b8b5ae',bg:'#fafaf8'},
  navy:{name:'藏蓝',hex:'#1a3a6c',bg:'#dce6ff'},red:{name:'红色',hex:'#c0392b',bg:'#ffe4e4'},
  khaki:{name:'卡其',hex:'#9a7d40',bg:'#fff3d6'},grey:{name:'浅灰',hex:'#909090',bg:'#f3f3f3'},
  green:{name:'墨绿',hex:'#2d6a4f',bg:'#dff5ea'},beige:{name:'米色',hex:'#c4a882',bg:'#fdf0e0'},
};
const SPU_DB={
  'SP1001':{name:'修身圆领卫衣',colors:[{key:'black',count:6},{key:'white',count:4},{key:'navy',count:5}]},
  'SP1002':{name:'直筒休闲长裤',colors:[{key:'khaki',count:5},{key:'black',count:4},{key:'grey',count:3}]},
  'SP1003':{name:'廓形风衣外套',colors:[{key:'beige',count:7},{key:'green',count:5},{key:'black',count:4},{key:'red',count:4}]},
};
const INSTRUCTIONS=[
  ['正面组','front','1','正面展示','a','左右转移身体重心，摆姿势，镜头固定'],
  ['正面组','front','1','正面展示','b','左右来回扭动几次，展示裤子正面'],
  ['正面组','front','2','正面细节展示','a','镜头推进，模特双手抚过裤子两边的口袋'],
  ['正面组','front','3','正面拉弹力','a','用手大力拉扯大腿两侧的裤子，展示弹力'],
  ['正面组','front','4','正面走出画面','a','向镜头走，直到走出画面，镜头不动'],
  ['背面组','back','1','背面展示','a','左右转移身体重心，摆姿势，镜头固定'],
  ['背面组','back','1','背面展示','b','原地小幅度左右移动，背面镜头固定拍摄'],
  ['背面组','back','2','背面细节展示','a','镜头推进，展示背面口袋'],
  ['背面组','back','3','深蹲','a','深蹲2次（需要蹲下去）'],
  ['正转背','front,back','1','正转背','a','左右转移重心摆姿势；然后转身到背面，屁股来回扭动'],
  ['细节组','detail','1','裤脚特写','a','镜头对准裤脚，模特轻微抬脚或走动，展示裤脚设计'],
];
const GRP_COLOR={'正面组':'#1677ff','背面组':'#389e0d','正转背':'#d46b08','细节组':'#531dab'};
const GRP_BG={'正面组':'#e6f4ff','背面组':'#f6ffed','正转背':'#fff7e6','细节组':'#f9f0ff'};
const GRP_BORDER={'正面组':'#91caff','背面组':'#b7eb8f','正转背':'#ffd591','细节组':'#d3adf7'};

function gSVG(idx,hex){
  const s='rgba(0,0,0,.12)',h='rgba(255,255,255,.2)';
  const sh=[
    '<path d="M22 22Q32 13 40 13Q48 13 58 22L66 42H54L54 90H26L26 42H14Z" fill="'+hex+'" stroke="'+s+'" stroke-width="1.5"/><path d="M32 13Q40 21 48 13" fill="none" stroke="'+s+'" stroke-width="1.5"/><ellipse cx="40" cy="27" rx="5" ry="3" fill="'+h+'"/>',
    '<path d="M22 22Q32 13 40 13Q48 13 58 22L66 42H54L54 90H26L26 42H14Z" fill="'+hex+'" stroke="'+s+'" stroke-width="1.5"/><circle cx="40" cy="54" r="2.5" fill="'+s+'"/><circle cx="40" cy="64" r="2.5" fill="'+s+'"/>',
    '<path d="M30 22Q37 13 42 13Q47 13 55 22L62 42H52L52 90H32L32 42H22Z" fill="'+hex+'" stroke="'+s+'" stroke-width="1.5"/>',
    '<rect x="18" y="24" width="44" height="58" rx="4" fill="'+hex+'" stroke="'+s+'" stroke-width="1.5"/><rect x="24" y="32" width="13" height="16" rx="2" fill="'+s+'" opacity=".35"/>',
    '<rect x="18" y="24" width="44" height="58" rx="4" fill="'+hex+'" stroke="'+s+'" stroke-width="1.5"/><circle cx="40" cy="44" r="9" fill="'+s+'" opacity=".22"/>',
    '<path d="M22 22Q32 13 40 13Q48 13 58 22L66 42H54L54 90H26L26 42H14Z" fill="'+hex+'" stroke="'+s+'" stroke-width="1.5"/><line x1="40" y1="22" x2="40" y2="90" stroke="'+s+'" stroke-width=".8" stroke-dasharray="3,3" opacity=".6"/>',
  ];
  return '<svg viewBox="0 0 80 100" fill="none">'+sh[idx%sh.length]+'</svg>';
}
function makeVidName(spu,colorName,ts,content){
  const d=new Date(ts),p=n=>String(n).padStart(2,'0');
  return spu+'-'+colorName+'-'+d.getFullYear()+p(d.getMonth()+1)+p(d.getDate())+'-'+content.slice(0,12);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);}

let cSPU=null,cColorIdx=0,activeWorkTab='single';
let selColorKey=null,selImgIdx=null,pairImg1=null,pairImg2=null;
let checkedRows=new Set(),allData=[];

function querySPU(){
  const v=document.getElementById('spuInput').value.trim().toUpperCase();
  if(!v){toast('请输入 SPU 编号');return;}
  if(!SPU_DB[v]){toast('未找到该 SPU，请试 SP1001 / SP1002 / SP1003');return;}
  cSPU={code:v,...SPU_DB[v]};cColorIdx=0;
  selColorKey=null;selImgIdx=null;pairImg1=null;pairImg2=null;checkedRows=new Set();
  document.getElementById('rCode').textContent=v+'\u00a0';
  document.getElementById('rName').textContent=cSPU.name;
  document.getElementById('spuTag').style.display='inline-flex';
  document.getElementById('btnReset').style.display='inline-flex';
  document.getElementById('spuHint').style.display='none';
  renderColorTabs();renderImages();renderRecords();
}
function resetSPU(){
  cSPU=null;cColorIdx=0;selColorKey=null;selImgIdx=null;pairImg1=null;pairImg2=null;checkedRows=new Set();
  document.getElementById('spuTag').style.display='none';
  document.getElementById('btnReset').style.display='none';
  document.getElementById('spuHint').style.display='';
  document.getElementById('spuInput').value='';
  document.getElementById('imgGrid').innerHTML='<div style="color:var(--text4);font-size:12px;padding:20px 0;text-align:center;grid-column:1/-1">先查询 SPU</div>';
  document.getElementById('ctabs').innerHTML='';
  renderRecords();
}
function switchWorkTab(tab){
  activeWorkTab=tab;
  document.querySelectorAll('.work-tab').forEach(el=>el.classList.remove('active'));
  document.getElementById(tab==='single'?'wtSingle':'wtPair').classList.add('active');
  selColorKey=null;selImgIdx=null;pairImg1=null;pairImg2=null;checkedRows=new Set();
  const ph=document.getElementById('pairHint');
  if(tab==='pair'){ph.textContent='点击选图1，再点选图2';ph.classList.add('show');document.getElementById('imgPanelTitle').textContent='选择两张图';}
  else{ph.classList.remove('show');document.getElementById('imgPanelTitle').textContent='选择商品图';}
  if(cSPU)renderImages();
  renderRecords();
}
function renderColorTabs(){
  if(!cSPU)return;
  document.getElementById('ctabs').innerHTML=cSPU.colors.map((c,i)=>{
    const col=COLORS[c.key];
    return '<div class="ctab '+(i===cColorIdx?'active':'')+'" onclick="switchColor('+i+')">'
      +'<div class="cdot" style="background:'+col.hex+'"></div>'+col.name+'<span class="ctab-n">'+c.count+'</span></div>';
  }).join('');
}
function switchColor(i){cColorIdx=i;renderColorTabs();renderImages();}
function renderImages(){
  if(!cSPU)return;
  const cData=cSPU.colors[cColorIdx],col=COLORS[cData.key];
  document.getElementById('imgGrid').innerHTML=Array.from({length:cData.count},(_,i)=>{
    let cls='',badge='';
    if(activeWorkTab==='single'){if(selColorKey===cData.key&&selImgIdx===i)cls='sel1';}
    else{
      if(pairImg1&&pairImg1.colorKey===cData.key&&pairImg1.imgIdx===i){cls='sel1';badge='<div class="img-card-badge badge-1">图1</div>';}
      else if(pairImg2&&pairImg2.colorKey===cData.key&&pairImg2.imgIdx===i){cls='sel2';badge='<div class="img-card-badge badge-2">图2</div>';}
    }
    return '<div class="img-card '+cls+'" onclick="selectImg(\''+cData.key+'\','+i+')">'
      +badge+'<div class="img-card-num">#'+String(i+1).padStart(2,'0')+'</div>'
      +'<div class="img-visual" style="background:'+col.bg+'">'+gSVG(i,col.hex)+'</div></div>';
  }).join('');
}
function selectImg(colorKey,imgIdx){
  if(activeWorkTab==='single'){
    if(selColorKey===colorKey&&selImgIdx===imgIdx){selColorKey=null;selImgIdx=null;checkedRows=new Set();}
    else{selColorKey=colorKey;selImgIdx=imgIdx;initCheckedRows();}
    renderImages();renderRecords();
  } else {
    const ph=document.getElementById('pairHint');
    if(!pairImg1){pairImg1={colorKey,imgIdx};ph.textContent='已选图1，再点选图2';}
    else if(!pairImg2){
      if(pairImg1.colorKey===colorKey&&pairImg1.imgIdx===imgIdx){toast('图1和图2不能相同');return;}
      pairImg2={colorKey,imgIdx};ph.textContent='图1和图2已选好，可批量生成';initCheckedRows();
    } else {pairImg1={colorKey,imgIdx};pairImg2=null;checkedRows=new Set();ph.textContent='已选图1，再点选图2';}
    renderImages();renderRecords();
  }
}
function getInitialInsts(){
  return activeWorkTab==='single'
    ?INSTRUCTIONS.filter(r=>!r[1].includes(',')&&r[4]==='a')
    :INSTRUCTIONS.filter(r=>r[1].includes(',')&&r[4]==='a');
}
function initCheckedRows(){
  checkedRows=new Set();
  getInitialInsts().forEach(inst=>{if(!hasRecord(inst[0],inst[2]))checkedRows.add(rowKey(inst[0],inst[2]));});
}
function rowKey(group,v){return group+'|'+v;}
function hasRecord(group,v){
  if(!cSPU||!getCurrentImg())return false;
  return allData.some(r=>r.spu===cSPU.code&&r.group===group&&r.v===parseInt(v)&&matchesCurrentImg(r));
}
function getCurrentImg(){
  if(activeWorkTab==='single')return selColorKey&&selImgIdx!==null?true:null;
  return pairImg1&&pairImg2?true:null;
}
function matchesCurrentImg(r){
  if(activeWorkTab==='single')return r.colorKey===selColorKey&&r.imgIdx===selImgIdx&&!r.img2ColorKey;
  if(!pairImg1||!pairImg2)return false;
  return r.colorKey===pairImg1.colorKey&&r.imgIdx===pairImg1.imgIdx&&r.img2ColorKey===pairImg2.colorKey&&r.img2Idx===pairImg2.imgIdx;
}

function renderRecords(){
  const body=document.getElementById('recBody');
  const genBar=document.getElementById('genBar');
  const filterVal=document.getElementById('recFilter').value;
  const img=getCurrentImg();
  if(!cSPU||!img){
    body.innerHTML='<div class="rec-empty"><div class="rec-empty-ico">🎬</div>'
      +'<div style="font-size:13px;font-weight:500;color:var(--text2)">选择商品图开始</div>'
      +'<div style="font-size:12px">选图后自动列出可执行指令</div></div>';
    genBar.style.display='none';
    document.getElementById('recCount').textContent='';
    document.getElementById('recTitle').textContent='切片记录';
    return;
  }
  let titleSuffix='';
  if(activeWorkTab==='single'){const col=COLORS[selColorKey];titleSuffix=col.name+' · #'+String(selImgIdx+1).padStart(2,'0');}
  else{const c1=COLORS[pairImg1.colorKey],c2=COLORS[pairImg2.colorKey];titleSuffix=c1.name+'#'+String(pairImg1.imgIdx+1).padStart(2,'0')+'→'+c2.name+'#'+String(pairImg2.imgIdx+1).padStart(2,'0');}
  document.getElementById('recTitle').textContent='切片记录 · '+titleSuffix;

  const insts=getInitialInsts();
  const groups=[...new Set(insts.map(r=>r[0]))];
  const existingRecs=allData.filter(r=>r.spu===cSPU.code&&matchesCurrentImg(r));
  const pendingInsts=insts.filter(inst=>!hasRecord(inst[0],inst[2]));
  const filteredExisting=existingRecs.filter(r=>{
    if(!filterVal)return true;
    if(filterVal==='done_pending')return r.genStatus==='done'&&r.approveStatus==='ap_pending';
    if(filterVal==='pass')return r.approveStatus==='ap_pass';
    if(filterVal==='fail')return r.approveStatus==='ap_fail';
    if(filterVal==='pending')return r.genStatus==='pending';
    return true;
  });
  document.getElementById('recCount').textContent='共 '+(pendingInsts.length+filteredExisting.length)+' 条';

  genBar.style.display='flex';
  document.getElementById('genBtn').disabled=checkedRows.size===0;
  document.getElementById('genPreview').innerHTML=checkedRows.size>0?'已选 <strong>'+checkedRows.size+'</strong> 条待生成':'';
  const chkAll=document.getElementById('chkAll');
  chkAll.checked=pendingInsts.length>0&&checkedRows.size===pendingInsts.length;
  chkAll.indeterminate=checkedRows.size>0&&checkedRows.size<pendingInsts.length;

  const GEN_CONF={pending:{label:'待生成',cls:'gen-pending'},gen:{label:'生成中',cls:'gen-ing'},done:{label:'已完成',cls:'gen-done'}};
  const AP_CONF={'ap_pending':{label:'待审核',cls:'ap-pending'},'ap_pass':{label:'审核通过',cls:'ap-pass'},'ap_fail':{label:'不通过',cls:'ap-fail'}};
  const cbSVG='<svg viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5L3.5 6.5L7.5 2.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  let html='<div class="rec-groups">';
  groups.forEach(grp=>{
    const gc=GRP_COLOR[grp]||'#595959';
    const grpInsts=insts.filter(r=>r[0]===grp);
    const grpPending=pendingInsts.filter(r=>r[0]===grp);
    const totalV=new Set(grpInsts.map(r=>r[2])).size;
    const submittedV=new Set(existingRecs.filter(r=>r.group===grp).map(r=>r.v)).size;
    let progCls='prog-none',progTxt='0/'+totalV;
    if(submittedV>=totalV){progCls='prog-full';progTxt=totalV+'/'+totalV;}
    else if(submittedV>0){progCls='prog-part';progTxt=submittedV+'/'+totalV;}
    const grpPendingKeys=grpPending.map(inst=>rowKey(inst[0],inst[2]));
    const grpCheckedCount=grpPendingKeys.filter(k=>checkedRows.has(k)).length;
    const grpCbCls=grpPendingKeys.length>0&&grpCheckedCount===grpPendingKeys.length?'checked':'';
    const cbHidden=grpPendingKeys.length===0?' style="display:none"':'';

    html+='<div class="inst-group">'
      +'<div class="inst-group-hd">'
        +'<div class="row-cb '+grpCbCls+'"'+cbHidden+' onclick="toggleGroup(\''+grp+'\')">'+cbSVG+'</div>'
        +'<span class="inst-group-name" style="color:'+gc+'">'+grp+'</span>'
        +'<span class="inst-group-prog '+progCls+'">'+progTxt+' 组号已提交</span>'
      +'</div>';

    grpPending.forEach(inst=>{
      const key=rowKey(inst[0],inst[2]);
      const checked=checkedRows.has(key);
      html+='<div class="inst-row">'
        +'<div class="row-cb '+(checked?'checked':'')+'" onclick="toggleRow(\''+key+'\')">'+cbSVG+'</div>'
        +'<div class="row-name">'+inst[3]+'</div>'
        +'<div class="row-thumb empty">'+gSVG(parseInt(inst[2])%6,'#ccc')+'</div>'
        +'<div class="row-content">'+inst[5]+'</div>'
        +'<div class="row-col col-gen"><span style="font-size:11px;color:var(--text4)">待生成</span></div>'
        +'<div class="row-col col-ap"><span style="color:var(--text4)">—</span></div>'
        +'<div class="row-col col-ops"></div>'
        +'<div class="row-col col-try"></div>'
        +'</div>';
    });

    const grpExisting=existingRecs.filter(r=>r.group===grp&&(!filterVal||filteredExisting.includes(r)))
      .sort((a,b)=>a.v!==b.v?a.v-b.v:a.instIdx-b.instIdx);
    const vValues=[...new Set(grpExisting.map(r=>r.v))].sort((a,b)=>a-b);
    vValues.forEach(vNum=>{
      const vRecs=grpExisting.filter(r=>r.v===vNum).sort((a,b)=>a.instIdx-b.instIdx);
      const instDef=INSTRUCTIONS.find(x=>x[0]===grp&&x[2]===String(vNum)&&x[4]==='a');
      const groupName=instDef?instDef[3]:('组号 '+vNum);
      vRecs.forEach((r,ri)=>{
        const gc2=GEN_CONF[r.genStatus]||GEN_CONF.pending;
        const ac=AP_CONF[r.approveStatus];
        const col2=COLORS[r.colorKey]||{hex:'#999',bg:'#f5f5f5'};
        const isDone=r.genStatus==='done';
        const rowCls=r.approveStatus==='ap_fail'?'row-fail':r.approveStatus==='ap_pass'?'row-pass':'';
        const isPending=r.approveStatus==='ap_pending'&&isDone;
        const thumbHTML=isDone
          ?'<div class="row-thumb clickable" onclick="openPlayer(\''+r.id+'\')" style="background:'+col2.bg+'">'+gSVG(r.svgIdx,col2.hex)+'</div>'
          :'<div class="row-thumb empty">'+gSVG(r.svgIdx,'#ccc')+'</div>';
        const opsHTML=isPending
          ?'<button class="btn-pass" onclick="doPass(\''+r.id+'\')">通过</button>'
           +'<button class="btn-fail-act" onclick="doFail(\''+r.id+'\')">不通过</button>'
          :'';
        const tryHTML=ri===0?'<button class="btn-try-inline" onclick="openTryModal(\''+grp+'\','+vNum+')">+ 新指令</button>':'';
        html+='<div class="inst-row '+rowCls+'">'
          +'<div class="row-cb-spacer"></div>'
          +'<div class="row-name">'+(ri===0?groupName:'')+'</div>'
          +thumbHTML
          +'<div class="row-content" title="'+r.content+'">'+r.content+'</div>'
          +'<div class="row-col col-gen"><div class="status-badge '+gc2.cls+'"><div class="sdot"></div>'+gc2.label+'</div></div>'
          +'<div class="row-col col-ap">'+(ac?'<div class="status-badge '+ac.cls+'"><div class="sdot"></div>'+ac.label+'</div>':'<span style="color:var(--text4)">—</span>')+'</div>'
          +'<div class="row-col col-ops">'+opsHTML+'</div>'
          +'<div class="row-col col-try">'+tryHTML+'</div>'
          +'</div>';
      });
    });
    html+='</div>';
  });
  html+='</div>';
  body.innerHTML=html;
}

function toggleGroup(grp){
  const insts=getInitialInsts().filter(inst=>inst[0]===grp&&!hasRecord(inst[0],inst[2]));
  const keys=insts.map(inst=>rowKey(inst[0],inst[2]));
  const allChecked=keys.every(k=>checkedRows.has(k));
  if(allChecked)keys.forEach(k=>checkedRows.delete(k));else keys.forEach(k=>checkedRows.add(k));
  renderRecords();
}
function toggleRow(key){if(checkedRows.has(key))checkedRows.delete(key);else checkedRows.add(key);renderRecords();}
function toggleAll(checked){
  const pending=getInitialInsts().filter(inst=>!hasRecord(inst[0],inst[2]));
  if(checked)pending.forEach(inst=>checkedRows.add(rowKey(inst[0],inst[2])));else checkedRows.clear();
  renderRecords();
}
function doGenerate(){
  if(!cSPU||checkedRows.size===0)return;
  const now=Date.now(),newRecs=[];
  getInitialInsts().forEach(inst=>{
    const key=rowKey(inst[0],inst[2]);
    if(!checkedRows.has(key))return;
    const v=parseInt(inst[2]);
    const ck=activeWorkTab==='single'?selColorKey:pairImg1.colorKey;
    const col=COLORS[ck];const ts=now+newRecs.length;
    const rec={
      id:'r_'+ts+'_'+Math.random().toString(36).slice(2,5),
      spu:cSPU.code,spuName:cSPU.name,colorKey:ck,colorName:col.name,
      imgIdx:activeWorkTab==='single'?selImgIdx:pairImg1.imgIdx,
      group:inst[0],v,instIdx:0,content:inst[5],
      genStatus:'done',approveStatus:'ap_pending',ts,
      vidName:makeVidName(cSPU.code,col.name,ts,inst[5]),svgIdx:v%6,
    };
    if(activeWorkTab==='pair'){rec.img2ColorKey=pairImg2.colorKey;rec.img2Idx=pairImg2.imgIdx;}
    newRecs.push(rec);
  });
  allData.unshift(...newRecs);allData.sort((a,b)=>b.ts-a.ts);
  checkedRows.clear();renderRecords();
  toast('✓ 已提交 '+newRecs.length+' 条生成记录');
}
function doPass(id){const r=allData.find(r=>r.id===id);if(!r)return;r.approveStatus='ap_pass';renderRecords();toast('✓ 审核通过，视频已同步至素材库');}
function doFail(id){const r=allData.find(r=>r.id===id);if(!r)return;r.approveStatus='ap_fail';renderRecords();}

// INST LIST MODAL
function openInstModal(){
  const GRP_CSS={
    '正面组':{color:'#1677ff',bg:'#e6f4ff',border:'#91caff'},
    '背面组':{color:'#389e0d',bg:'#f6ffed',border:'#b7eb8f'},
    '正转背':{color:'#d46b08',bg:'#fff7e6',border:'#ffd591'},
    '细节组':{color:'#531dab',bg:'#f9f0ff',border:'#d3adf7'},
  };
  document.getElementById('instModalBody').innerHTML=INSTRUCTIONS.map(([grp,tag,v,name,abc,content],i)=>{
    const css=GRP_CSS[grp]||{color:'#595959',bg:'#f5f5f5',border:'#d9d9d9'};
    return '<tr>'
      +'<td style="text-align:center;font-size:11px;color:var(--text4);font-family:DM Mono,monospace;width:36px">'+(i+1)+'</td>'
      +'<td><span class="grp-tag" style="color:'+css.color+';background:'+css.bg+';border-color:'+css.border+'">'+grp+'</span></td>'
      +'<td style="font-size:12px;font-weight:500;color:var(--text)">'+name+'</td>'
      +'<td style="font-size:12px;color:var(--text2);line-height:1.6">'+content+'</td>'
      +'<td><span style="font-size:11px;font-family:DM Mono,monospace;background:#f5f5f5;padding:1px 6px;border-radius:2px;border:1px solid #e4e4e4">'+tag+'</span></td>'
      +'</tr>';
  }).join('');
  document.getElementById('instModalCount').textContent='共 '+INSTRUCTIONS.length+' 条指令';
  document.getElementById('instModalBg').classList.add('show');
}
function closeInstModal(){document.getElementById('instModalBg').classList.remove('show');}

// TRY MODAL
let modalGrp=null,modalVNum=null;
function openTryModal(grp,vNum){
  modalGrp=grp;modalVNum=vNum;
  const instRow=INSTRUCTIONS.find(x=>x[0]===grp&&x[2]===String(vNum)&&x[4]==='a');
  document.getElementById('tryModalTitle').textContent=(instRow?instRow[3]:('组号 '+vNum))+' · 尝试新指令';
  document.getElementById('tryModalSubtitle').textContent=grp;
  document.getElementById('tryModalInput').value='';
  refreshModalBody();
  document.getElementById('tryModalBg').classList.add('show');
  setTimeout(()=>document.getElementById('tryModalInput').focus(),60);
}
function refreshModalBody(){
  const AP_CONF={'ap_pending':{label:'待审核',cls:'ap-pending'},'ap_pass':{label:'审核通过',cls:'ap-pass'},'ap_fail':{label:'不通过',cls:'ap-fail'}};
  const histRecs=allData.filter(x=>x.spu===cSPU.code&&x.group===modalGrp&&x.v===modalVNum&&matchesCurrentImg(x)).sort((a,b)=>a.instIdx-b.instIdx);
  document.getElementById('tryModalBody').innerHTML=histRecs.length===0
    ?'<div class="modal-empty">暂无历史尝试记录</div>'
    :histRecs.map(hr=>{
      const ac=AP_CONF[hr.approveStatus];
      const rowBg=hr.approveStatus==='ap_fail'?'background:#fff8f8;border-color:var(--red-b)':hr.approveStatus==='ap_pass'?'background:#f9fff6;border-color:var(--green-b)':'';
      return '<div class="modal-hist-row" style="'+rowBg+'">'
        +'<div class="modal-hist-content">'+hr.content+'</div>'
        +(ac?'<div class="status-badge '+ac.cls+'" style="flex-shrink:0"><div class="sdot"></div>'+ac.label+'</div>':'<span style="color:var(--text4);font-size:11px;flex-shrink:0">—</span>')
        +'</div>';
    }).join('');
}
function closeTryModal(){document.getElementById('tryModalBg').classList.remove('show');}
function submitFromModal(){
  const txt=document.getElementById('tryModalInput').value.trim();
  if(!txt){toast('请输入指令内容');return;}
  const existing=allData.filter(x=>x.spu===cSPU.code&&x.group===modalGrp&&x.v===modalVNum&&matchesCurrentImg(x));
  if(!existing.length)return;
  const ctx=existing[0];const maxIdx=Math.max(...existing.map(x=>x.instIdx));const ts=Date.now();
  const newRec={
    id:'r_'+ts+'_'+Math.random().toString(36).slice(2,5),
    spu:ctx.spu,spuName:ctx.spuName,colorKey:ctx.colorKey,colorName:ctx.colorName,imgIdx:ctx.imgIdx,
    group:modalGrp,v:modalVNum,instIdx:maxIdx+1,content:txt,
    genStatus:'done',approveStatus:'ap_pending',ts,
    vidName:makeVidName(ctx.spu,ctx.colorName,ts,txt),svgIdx:ctx.svgIdx,
  };
  if(ctx.img2ColorKey){newRec.img2ColorKey=ctx.img2ColorKey;newRec.img2Idx=ctx.img2Idx;}
  allData.unshift(newRec);allData.sort((a,b)=>b.ts-a.ts);
  document.getElementById('tryModalInput').value='';
  closeTryModal();renderRecords();
  toast('✓ 新指令已提交');
}

// PLAYER
let playerTimer=null,playerSeconds=0,playerPlaying=false;
const PLAYER_DURATION=30;
function openPlayer(id){
  const r=allData.find(r=>r.id===id);if(!r)return;
  const col=COLORS[r.colorKey]||{hex:'#1a3a6c'};
  document.getElementById('playerName').textContent=r.vidName;
  document.getElementById('playerGarment').innerHTML=gSVG(r.svgIdx,col.hex);
  document.getElementById('playerGarment').style.filter='drop-shadow(0 0 20px '+col.hex+'66)';
  resetPlayer();document.getElementById('playerBg').classList.add('show');
}
function closePlayer(){document.getElementById('playerBg').classList.remove('show');resetPlayer();}
function resetPlayer(){clearInterval(playerTimer);playerPlaying=false;playerSeconds=0;updatePlayerUI();}
function togglePlay(){
  if(playerPlaying){clearInterval(playerTimer);playerPlaying=false;}
  else{
    if(playerSeconds>=PLAYER_DURATION)playerSeconds=0;
    playerPlaying=true;
    playerTimer=setInterval(()=>{playerSeconds+=0.5;if(playerSeconds>=PLAYER_DURATION){playerSeconds=PLAYER_DURATION;clearInterval(playerTimer);playerPlaying=false;}updatePlayerUI();},500);
  }
  updatePlayerUI();
}
function seekTo(e){const bar=e.currentTarget,rect=bar.getBoundingClientRect();playerSeconds=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width))*PLAYER_DURATION;updatePlayerUI();}
function updatePlayerUI(){
  document.getElementById('progressFill').style.width=(playerSeconds/PLAYER_DURATION*100)+'%';
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  document.getElementById('playerTime').textContent=fmt(playerSeconds)+' / '+fmt(PLAYER_DURATION);
  const icon=document.getElementById('playIcon');
  if(playerPlaying){icon.className='';icon.innerHTML='<div class="player-pause-icon"><span></span><span></span></div>';}
  else{icon.className='player-play-icon';icon.innerHTML='';}
}

renderRecords();
</script>
